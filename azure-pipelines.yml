trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  imageRepository: taskapi
  containerRegistry: acr-taskapi-connection
  tag: $(Build.BuildId)

steps:

- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '8.x'

- task: DotNetCoreCLI@2
  displayName: Restore
  inputs:
    command: restore
    projects: '**/*.csproj'

- task: DotNetCoreCLI@2
  displayName: Build
  inputs:
    command: build
    projects: '**/*.csproj'
    arguments: '--configuration Release'

- task: Docker@2
  displayName: Build and Push Image
  inputs:
    containerRegistry: $(containerRegistry)
    repository: $(imageRepository)
    command: buildAndPush
    Dockerfile: '**/Dockerfile'
    tags: |
      $(tag)